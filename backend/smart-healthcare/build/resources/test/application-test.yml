spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false

app:
  auth:
    session-store: memory
    jwt:
      issuer: smart-healthcare-test
      access-expire-sec: 1800
      refresh-expire-sec: 604800
      secret: smart-healthcare-test-super-secret-key-for-hs256-signing-2026
    cookie:
      secure: false
