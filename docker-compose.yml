services:
  redis:
    image: redis:7-alpine
    container_name: smart-redis
    ports:
      - "6379:6379"

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: smart-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:11.2.2
    container_name: smart-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus

  k6:
    image: grafana/k6:0.55.0
    container_name: smart-k6
    volumes:
      - ./monitoring/k6:/scripts:ro
    entrypoint: ["/bin/sh", "-lc"]
    command: ["k6 run /scripts/inbody-load-test.js"]
    profiles: ["loadtest"]
